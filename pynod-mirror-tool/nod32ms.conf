# -*- coding: utf-8 -*-
# This file is part of the PyNOD-Mirror-Tool project.
# The latest version can be downloaded at:
# https://github.com/Scorpikor/pynod-mirror-tool

[PATCH]
# Enable patch application = 1, disabled = 0
protoscan_v3_patch = 1

[LOG]
# Enable creation of a log file (log.txt) in the script root = 1 (enabled)
generate_log_file = 0

# Path to the log file. If missing or invalid, logs will be saved to the script folder as pynod-mirror-tool.log
log_file_path = /var/log/pynod-mirror-tool.log

# Log file size in KB
log_file_size = 150

# Verbosity level for console and file logs
# Values from 1 to 3, or 5 for debugging
log_informativeness = 3

# Enable web page generation = 1 (enabled)
generate_web_page = 0

# Generate table only = 1, or 0 for a complete web page
generate_table_only = 0

# Path and filename for the generated web page
html_table_path_file = /var/www/berta/nod32_update.html

[TELEGRAM]
# Settings for sending logs to Telegram
# Obtain your token from https://t.me/BotFather
# and find your chat_id (check online guides on how to do this)

# 0 = disabled, 1 = enabled
telegram_inform = 0				

token = XXXXXXXXXX:AABBBBCCDDEE_FFFFFFFFFFFFFFFFFFFFFF
chat_id = XXXXXXXXXX

# Custom text field for notes. Can be used as a license expiration reminder (e.g., Expire 12.05.2032).
# Can be left empty.
text =

[SCRIPT]
# Path to your www root directory where all update files will be stored.
# This parameter is mandatory for the script to function!
# If running on Windows, this variable defines the www root:
windows_web_dir = c:\var\www\nod32mirror2

# If running on Linux or FreeBSD, this variable defines the www root:
linux_web_dir = /var/www/nod32mirror2


[CONNECTION]
# Set official_servers_update = 1 to update from official ESET servers (uses [OFFICIAL_SERVERS] list).
# Set official_servers_update = 0 to update from unofficial mirrors.
official_servers_update = 0

# Mirror connection settings
mirror = http://mirror.lol

# Fill mirror_user and mirror_password if authentication is required.
# Mandatory for official ESET server updates!
mirror_user = 
mirror_password =

# Connection operation timeout
mirror_timeout = 7

# Number of download retry attempts
mirror_connect_retries = 5

# Number of concurrent download threads
# Attention! Please be considerate of other servers; high thread counts increase the risk 
# of failure and being banned by the server owner.
max_workers = 5

[OFFICIAL_SERVERS]
# List of official update servers.
# The script will automatically select the best "live" server based on ping.
# (IMPORTANT!) Servers must be listed as domain names or IPs only, without http://
mirror1 = um01.eset.com
mirror2 = um02.eset.com
mirror3 = um03.eset.com
mirror4 = um04.eset.com
mirror5 = um05.eset.com
mirror6 = um06.eset.com
mirror7 = um07.eset.com
mirror8 = um08.eset.com
mirror9 = um09.eset.com
mirror10 = um10.eset.com
mirror11 = um11.eset.com
#mirror12 = um12.eset.com
mirror13 = um13.eset.com
#mirror14 = um14.eset.com
#mirror15 = um15.eset.com
#mirror16 = um16.eset.com
#mirror17 = um17.eset.com
#mirror18 = um18.eset.com
#mirror19 = um19.eset.com
#mirror20 = um20.eset.com
mirror21 = um21.eset.com
#mirror22 = um22.eset.com
mirror23 = um23.eset.com

[ESET]
# Database storage mode.
# Enabling this (1) stores all database files in a single folder without subdirectories.
# This mode allows updating antivirus clients directly from a folder without a web server.
mode_one_dir_base = 0

# Folder name for database storage within the web server root.
# Ignored if mode_one_dir_base is enabled.
prefix = data

# Create update mirrors for specific versions:
# ESET Versions
# Inactive versions (databases missing from official ESET servers):
# v5 v9 v11 v12 v13 v18? ep5

versionv3    = 0
versionv5    = 0
versionv9    = 0
versionv10   = 0
versionv12   = 0
versionv13   = 0
versionv14   = 0
versionv15   = 0
versionv16   = 0
versionv18   = 0
versionv19   = 0
versionep5   = 0
versionep6   = 0
versionep8   = 0
versionep9   = 0
versionep10  = 0
versionep11  = 0
versionep12  = 1




